apiVersion: apps/v1
kind: Deployment
metadata:
  name: seller-web
  namespace: default
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: seller-web
  template:
    metadata:
      labels:
        app: seller-web
    spec:
      containers:
        - name: seller-web
          image: 1998rajdeo/seller-web:latest   # CI will replace this with SHA tag
          imagePullPolicy: IfNotPresent
          workingDir: /app
          ports:
            - containerPort: 3000
          # Removed overridden ["node", "server.js"] command to respect Dockerfile's npm start entrypoint
          env:
            - name: NODE_ENV
              value: "production"
            - name: VERSION
              value: "1998rajdeo/seller-web:latest"
            - name: TRACING_SERVICE_NAME
              value: "1998rajdeo/seller-web"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://my-release-signoz-otel-collector.observability.svc.cluster.local:4318"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15 # Bumped slightly for NextJS development/prod startup overhead
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: seller-web-service
  namespace: default
spec:
  selector:
    app: seller-web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seller-web-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: seller.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seller-web-service
                port:
                  number: 80