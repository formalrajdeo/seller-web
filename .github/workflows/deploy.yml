name: Build and Deploy

on:
  push:
    branches:
      - master

concurrency:
  group: 1998rajdeo-deploy
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    # MUST allow write access for cross-repo copying or syncing actions
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Short Commit SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Update Image Name Tag in Manifest
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "1998rajdeo/seller-web:latest"
          replace: "1998rajdeo/seller-web:${{ steps.vars.outputs.sha_short }}"
          include: "deployment/**"
          regex: false

      - name: Update Version Env Variable Tracking in Manifest
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "value: \"seller-web:latest\""
          replace: "value: \"seller-web:${{ steps.vars.outputs.sha_short }}\""
          include: "deployment/**"
          regex: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: 1998rajdeo/seller-web:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Deployment Manifest to Infra Repo
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        run: |
          # 1. Clone the target infra repository using your secret token
          git clone https://x-access-token:${API_TOKEN_GITHUB}@github.com/formalrajdeo/infra.git infra-repo
          
          # 2. Ensure the destination directory exists inside the cloned repo
          mkdir -p infra-repo/edge/seller-web/
          
          # 3. Copy the modified manifest file into the destination folder
          cp deployment/seller-web.yaml infra-repo/edge/seller-web/seller-web.yaml
          
          # 4. Navigate into the infra repo and configure local Git identity
          cd infra-repo
          git config user.name "rajdeo"
          git config user.email "formal.rajdeo@gmail.com"
          
          # 5. Stage, commit, and push changes back to the master branch
          git add edge/seller-web/seller-web.yaml
          
          # Only commit and push if the manifest actually changed
          if git diff-index --quiet HEAD --; then
            echo "No changes detected in the manifest file. Skipping push."
          else
            git commit -m "seller web update from CI pipeline [SHA: ${{ steps.vars.outputs.sha_short }}]"
            git push origin master
          fi